---
- name: Bootstrap openEuler 24.03 LTS SP3 nodes
  hosts: all
  become: true
  tasks:
    - name: Install base packages
      ansible.builtin.package:
        name:
          - git
          - curl
          - wget
          - tar
          - podman
          - podman-compose
          - python3
          - python3-pip
          - firewalld
          - rsync
        state: present

    - name: Enable firewalld
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Create platform directories
      ansible.builtin.file:
        path: "{{ platform_root }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - data
        - logs
        - releases

    - name: Apply kernel tuning for observability
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-slz-aiops.conf
        mode: "0644"
        content: |
          fs.inotify.max_user_instances = 1024
          fs.inotify.max_user_watches = 524288
          vm.max_map_count = 262144

    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true
