server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/engine/ {
        proxy_pass ${CONSOLE_AI_ENGINE_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/cmdb/ {
        proxy_pass ${CONSOLE_CMDB_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/jobs/ {
        proxy_pass ${CONSOLE_JOB_RUNNER_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/prometheus/ {
        proxy_pass ${CONSOLE_PROMETHEUS_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/alertmanager/ {
        proxy_pass ${CONSOLE_ALERTMANAGER_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/loki/ {
        proxy_pass ${CONSOLE_LOKI_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}