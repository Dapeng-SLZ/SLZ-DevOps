name: Release Packages

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${TAG}" != "v${VERSION}" ]]; then
            echo "Tag ${TAG} does not match VERSION v${VERSION}" >&2
            exit 1
          fi

  package-linux:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Linux release package
        shell: bash
        run: |
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh

      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: releases/slz-devops-${{ needs.prepare.outputs.version }}.tar.gz
          if-no-files-found: error

  package-windows:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Windows release package
        shell: pwsh
        run: .\scripts\package-release.ps1

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: releases/slz-devops-${{ needs.prepare.outputs.version }}.zip
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package-linux
      - package-windows
    steps:
      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: dist/linux

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: dist/windows

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: SLZ DevOps ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/linux/*.tar.gz
            dist/windows/*.zip
