name: slz-aiops

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: slz-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/rules:/etc/prometheus/rules:ro
      - ../prometheus/targets:/etc/prometheus/targets:ro
      - ../../data/prometheus:/prometheus
    networks:
      - aiops-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: slz-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-19093}:9093"
    volumes:
      - ../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ../../data/alertmanager:/alertmanager
    networks:
      - aiops-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: slz-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../../data/grafana:/var/lib/grafana
    networks:
      - aiops-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: slz-loki
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "${LOKI_PORT:-13100}:3100"
    volumes:
      - ../loki/config.yml:/etc/loki/config.yml:ro
      - ../../data/loki:/loki
    networks:
      - aiops-net
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: slz-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "${TEMPO_PORT:-13200}:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - ../../data/tempo:/tmp/tempo
    profiles:
      - analysis
      - demo
    networks:
      - aiops-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: slz-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ../promtail/config.yml:/etc/promtail/config.yml:ro
      - ../../data/promtail:/tmp
      - /var/log:/var/log:ro
    networks:
      - aiops-net
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: slz-blackbox
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    ports:
      - "${BLACKBOX_PORT:-19115}:9115"
    volumes:
      - ../blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - aiops-net
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: slz-nginx-exporter
    command:
      - --nginx.scrape-uri=${NGINX_STATUS_URI:-http://127.0.0.1:8081/stub_status}
    profiles:
      - middleware
    networks:
      - aiops-net
    restart: unless-stopped

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: slz-mysqld-exporter
    environment:
      DATA_SOURCE_NAME: ${MYSQL_EXPORTER_DSN:-exporter:change_me@(127.0.0.1:3306)/}
    profiles:
      - middleware
    networks:
      - aiops-net
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: slz-redis-exporter
    environment:
      REDIS_ADDR: ${REDIS_EXPORTER_ADDR:-redis://127.0.0.1:6379}
      REDIS_PASSWORD: ${REDIS_EXPORTER_PASSWORD:-}
    profiles:
      - middleware
    networks:
      - aiops-net
    restart: unless-stopped

  snmp-exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: slz-snmp-exporter
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
    volumes:
      - ../snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    profiles:
      - network
    networks:
      - aiops-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: slz-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - aiops-net
    restart: unless-stopped

  ai-engine:
    build:
      context: ../../services/ai-engine
    container_name: slz-ai-engine
    environment:
      AIOPS_APP_NAME: SLZ AIOps Engine
      AIOPS_ALERT_WEBHOOK_TOKEN: changeme
      AIOPS_CMDB_URL: http://cmdb:8081
    ports:
      - "${AI_ENGINE_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aiops-net
    restart: unless-stopped

  cmdb:
    build:
      context: ../../services/cmdb
    container_name: slz-cmdb
    environment:
      CMDB_APP_NAME: SLZ CMDB Service
      CMDB_DATA_FILE: /app/data/seed.json
    ports:
      - "${CMDB_PORT:-18081}:8081"
    volumes:
      - ../../services/cmdb/data:/app/data:ro
    profiles:
      - analysis
    networks:
      - aiops-net
    restart: unless-stopped

  neo4j:
    image: neo4j:5.24.0
    container_name: slz-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change_me_now}
    ports:
      - "${NEO4J_HTTP_PORT:-17474}:7474"
      - "${NEO4J_BOLT_PORT:-17687}:7687"
    volumes:
      - ../../data/neo4j/data:/data
      - ../../data/neo4j/logs:/logs
    profiles:
      - analysis
    networks:
      - aiops-net
    restart: unless-stopped

  demo-gateway:
    build:
      context: ../../services/demo-gateway
    container_name: slz-demo-gateway
    environment:
      OTEL_SERVICE_NAME: demo-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=slz-demo
      ORDER_SERVICE_URL: http://demo-order:8083
    ports:
      - "${DEMO_GATEWAY_PORT:-18082}:8082"
    profiles:
      - demo
    networks:
      - aiops-net
    restart: unless-stopped

  demo-order:
    build:
      context: ../../services/demo-order
    container_name: slz-demo-order
    environment:
      OTEL_SERVICE_NAME: demo-order
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=slz-demo
    ports:
      - "${DEMO_ORDER_PORT:-18083}:8083"
    profiles:
      - demo
    networks:
      - aiops-net
    restart: unless-stopped

networks:
  aiops-net:
    driver: bridge
