global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: ai-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - ai-engine:8080

  - job_name: cmdb
    metrics_path: /metrics
    static_configs:
      - targets:
          - cmdb:8081

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://grafana:3000/login
          - http://ai-engine:8080/healthz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: nginx-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/nginx-exporter.yml

  - job_name: mysqld-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/mysqld-exporter.yml

  - job_name: redis-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/redis-exporter.yml

  - job_name: snmp
    metrics_path: /snmp
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/snmp-targets.yml
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116
